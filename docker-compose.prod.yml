# ─────────────────────────────────────────────────────────────────────────────
# Mailvex — full production stack (single-VPS deployment)
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Domains (set in .env, point their DNS at this VPS first):
#   https://${APP_DOMAIN}   → frontend
#   https://${API_DOMAIN}   → API
#
# Caddy terminates TLS (auto Let's Encrypt) and proxies to the internal
# services. Postgres / Redis / NATS stay on the private docker network only.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Edge reverse proxy + automatic HTTPS ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks: [mailvex]

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [mailvex]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [mailvex]

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [mailvex]

  # ── DB migrate + seed (one-shot, runs before api/workers) ────────────────────
  # Applies all Drizzle migrations in database/migrations/ (0000–0007), including
  # contacts, segments, workflows, billing, worker tables, api_keys, domains.
  migrate:
    build:
      context: ./engageiq-api
      dockerfile: infra/docker/Dockerfile
    restart: "no"
    command: sh -c "node dist/scripts/migrate.js && node dist/scripts/seed.js"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [mailvex]

  # ── API (Node / Fastify) ──────────────────────────────────────────────────────
  api:
    build:
      context: ./engageiq-api
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    command: ["node", "dist/app/server.js"]
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      HOST: 0.0.0.0
      PORT: "4000"
      TRUST_PROXY: "true"

      APP_PUBLIC_URL: https://${APP_DOMAIN}
      API_PUBLIC_URL: https://${API_DOMAIN}
      CORS_ORIGINS: https://${APP_DOMAIN}

      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SSL: "false"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://nats:4222

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      SWAGGER_ENABLED: "false"

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CHECKOUT_SUCCESS_URL: https://${APP_DOMAIN}/billing/success?session_id={CHECKOUT_SESSION_ID}
      STRIPE_CHECKOUT_CANCEL_URL: https://${APP_DOMAIN}/billing/cancel
      STRIPE_PORTAL_RETURN_URL: https://${APP_DOMAIN}/billing
      STRIPE_STARTER_MONTHLY_PRICE_ID: ${STRIPE_STARTER_MONTHLY_PRICE_ID}
      STRIPE_STARTER_YEARLY_PRICE_ID: ${STRIPE_STARTER_YEARLY_PRICE_ID}
      STRIPE_GROWTH_MONTHLY_PRICE_ID: ${STRIPE_GROWTH_MONTHLY_PRICE_ID}
      STRIPE_GROWTH_YEARLY_PRICE_ID: ${STRIPE_GROWTH_YEARLY_PRICE_ID}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID}
      STRIPE_SCALE_MONTHLY_PRICE_ID: ${STRIPE_SCALE_MONTHLY_PRICE_ID}
      STRIPE_SCALE_YEARLY_PRICE_ID: ${STRIPE_SCALE_YEARLY_PRICE_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [mailvex]

  # ── Workers (Go) ──────────────────────────────────────────────────────────────
  workers:
    build:
      context: ./engageiq-workers
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://nats:4222
      METRICS_PORT: "9090"
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SES_RATE_LIMIT_PER_SEC: ${SES_RATE_LIMIT_PER_SEC:-14}
      CAMPAIGN_CHUNK_SIZE: ${CAMPAIGN_CHUNK_SIZE:-500}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [mailvex]

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/main-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api/v1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks: [mailvex]

volumes:
  postgres_data:
  redis_data:
  nats_data:
  caddy_data:
  caddy_config:

networks:
  mailvex:
    driver: bridge
